<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Logo Dott. Antonio Tiziano Sergi</title>
  <desc id="desc">Logo orizzontale con monogramma ATS e denominazione professionale.</desc>
  <defs>
    <linearGradient id="sealBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ee" />
      <stop offset="100%" stop-color="#ebe5d9" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#c9bfae" />
      <stop offset="100%" stop-color="#556b63" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#42504a" flood-opacity="0.12" />
    </filter>
  </defs>

  <g transform="translate(24 26)" filter="url(#shadow)">
    <circle cx="92" cy="102" r="82" fill="url(#sealBg)" stroke="#d8d0c0" stroke-width="2.5" />
    <circle cx="92" cy="102" r="65" fill="none" stroke="#556b63" stroke-opacity="0.18" stroke-width="1.5" />
    <text x="92" y="118" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-size="50" letter-spacing="6" fill="#556b63">ATS</text>
  </g>

  <g transform="translate(235 54)">
    <text x="0" y="54" font-family="'Times New Roman', Georgia, serif" font-size="58" fill="#2c2c2c">Dott. Antonio Tiziano Sergi</text>
    <line x1="2" y1="84" x2="520" y2="84" stroke="url(#accentLine)" stroke-width="2.4" stroke-linecap="round" />
    <text x="0" y="128" font-family="Inter, Arial, sans-serif" font-size="24" letter-spacing="6" fill="#7d8b85">CONSULENTE IN SCIENZA ANALOGISTA</text>
    <text x="0" y="176" font-family="Inter, Arial, sans-serif" font-size="21" fill="#666256">Osservazione, comprensione e riequilibrio</text>
  </g>
</svg>
