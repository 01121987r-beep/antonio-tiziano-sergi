<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Monogramma ATS</title>
  <desc id="desc">Marchio compatto circolare con le iniziali ATS.</desc>
  <defs>
    <linearGradient id="markBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ee" />
      <stop offset="100%" stop-color="#eae3d7" />
    </linearGradient>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#42504a" flood-opacity="0.14" />
    </filter>
  </defs>

  <g filter="url(#markShadow)">
    <circle cx="160" cy="160" r="124" fill="url(#markBg)" stroke="#d7cfbf" stroke-width="3" />
    <circle cx="160" cy="160" r="98" fill="none" stroke="#556b63" stroke-opacity="0.18" stroke-width="2" />
    <circle cx="160" cy="160" r="82" fill="none" stroke="#c9bfae" stroke-opacity="0.6" stroke-width="1.5" />
  </g>

  <text x="160" y="177" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-size="76" letter-spacing="10" fill="#556b63">ATS</text>
</svg>
